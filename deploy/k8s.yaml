apiVersion: apps/v1
kind: Deployment
metadata: { name: hermes, labels: { app: hermes } }
spec:
  replicas: 1
  selector: { matchLabels: { app: hermes } }
  template:
    metadata: { labels: { app: hermes } }
    spec:
      containers:
        - name: hermes
          image: ghcr.io/cognis-digital/hermes:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: hermes }
spec:
  selector: { app: hermes }
  ports: [{ port: 80, targetPort: 8000 }]
